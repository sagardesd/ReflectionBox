name: Build and publish Docker image

on:
  push:
    branches: [main]
    paths:
      # Only rebuild when the compiler or helper scripts change
      - '.devcontainer/Dockerfile'
      - 'scripts/**'
  workflow_dispatch:  # allow manual trigger from the GitHub UI

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    # This job compiles LLVM — give it plenty of time
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: .devcontainer/Dockerfile
          target: dev
          push: false
          load: true
          build-args: |
            JOBS=4
          tags: |
            sagardesd/reflectionbox:latest
            sagardesd/reflectionbox:${{ github.sha }}
          cache-from: type=registry,ref=sagardesd/reflectionbox:buildcache
          cache-to: type=registry,ref=sagardesd/reflectionbox:buildcache,mode=max

      - name: Push image
        run: |
          docker push sagardesd/reflectionbox:latest
          docker push sagardesd/reflectionbox:${{ github.sha }}
